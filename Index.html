<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .container { text-align: center; }
        .status-box {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            margin: 30px auto;
            transition: all 0.3s;
        }
        .status-box.red {
            background: #ff0000;
            box-shadow: 0 0 50px #ff0000, 0 0 100px #ff0000;
            animation: pulseRed 1s infinite;
        }
        .status-box.green {
            background: #00ff00;
            box-shadow: 0 0 50px #00ff00, 0 0 100px #00ff00;
            animation: pulseGreen 1s infinite;
        }
        .status-box.checking { background: #333; box-shadow: 0 0 20px #666; }
        @keyframes pulseRed {
            0% { box-shadow: 0 0 50px #ff0000; }
            50% { box-shadow: 0 0 100px #ff0000, 0 0 150px #ff0000; }
            100% { box-shadow: 0 0 50px #ff0000; }
        }
        @keyframes pulseGreen {
            0% { box-shadow: 0 0 50px #00ff00; }
            50% { box-shadow: 0 0 100px #00ff00, 0 0 150px #00ff00; }
            100% { box-shadow: 0 0 50px #00ff00; }
        }
        .status-text { font-size: 24px; font-weight: bold; margin-top: 20px; }
        .red-text { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        .green-text { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .info { color: #666; margin-top: 30px; font-size: 12px; }
        button {
            margin-top: 20px;
            padding: 10px 30px;
            background: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover { background: #00ff00; color: black; }
        h1 { color: #00ff00; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ NEON STATUS</h1>
        <div class="status-box checking" id="statusBox"></div>
        <div class="status-text" id="statusText">CHECKING...</div>
        <div class="info">
            <div>🕐 <span id="lastUpdate">--:--:--</span></div>
        </div>
        <button onclick="refreshStatus()">⟳ REFRESH</button>
    </div>
    <script>
        async function checkStatus() {
            try {
                const res = await fetch('/api/update-status');
                const data = await res.json();
                const box = document.getElementById('statusBox');
                const text = document.getElementById('statusText');
                if(data.status === 'active') {
                    box.className = 'status-box green';
                    text.innerHTML = '◉ ACTIVE';
                    text.className = 'status-text green-text';
                } else {
                    box.className = 'status-box red';
                    text.innerHTML = '◎ OFFLINE';
                    text.className = 'status-text red-text';
                }
                document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString();
            } catch(e) {
                document.getElementById('statusBox').className = 'status-box red';
                document.getElementById('statusText').innerHTML = '⚠ ERROR';
            }
        }
        async function refreshStatus() { await checkStatus(); }
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
