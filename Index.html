<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Camera Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #0a0a0a;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .logo span {
            color: #4CAF50;
        }

        /* Status Dot */
        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 6px 12px;
            border-radius: 30px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-green {
            background-color: #4CAF50;
            box-shadow: 0 0 6px #4CAF50;
            animation: pulse 1.5s infinite;
        }

        .dot-red {
            background-color: #f44336;
            box-shadow: 0 0 6px #f44336;
        }

        .dot-yellow {
            background-color: #FFC107;
            box-shadow: 0 0 6px #FFC107;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-label {
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        /* Live Stream Section */
        .stream-container {
            flex: 2;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .stream-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        #liveImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .placeholder-stream {
            text-align: center;
            color: #555;
        }

        .placeholder-stream .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        /* Browser Card */
        .browser-card {
            background: #111;
            margin: 12px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .browser-header {
            background: #1a1a1a;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
        }

        .url-input {
            flex: 1;
            padding: 8px 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .url-input:focus {
            outline: none;
            background: #333;
        }

        .go-btn {
            background: #333;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .go-btn:active {
            background: #444;
        }

        iframe {
            width: 100%;
            height: 200px;
            border: none;
            background: white;
        }

        /* Notes Section */
        .notes-card {
            background: #111;
            margin: 0 12px 12px 12px;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #222;
        }

        .section-title {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .camera-btn {
            width: 100%;
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .camera-btn:active {
            background: #1b5e20;
        }

        .note-input {
            width: 100%;
            min-height: 70px;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            resize: vertical;
        }

        .note-input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .save-btn {
            width: 100%;
            background: #FF9800;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .save-btn:active {
            background: #e68900;
        }

        .notes-list {
            max-height: 140px;
            overflow-y: auto;
            margin-top: 12px;
        }

        .note-item {
            background: #1a1a1a;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .note-content {
            flex: 1;
            color: #ddd;
            font-size: 12px;
        }

        .note-content img {
            max-width: 50px;
            border-radius: 8px;
            margin-top: 6px;
        }

        .note-date {
            color: #666;
            font-size: 10px;
            display: block;
            margin-top: 4px;
        }

        .delete-btn {
            background: #c62828;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Camera Modal */
        .camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }

        .camera-modal.active {
            display: flex;
        }

        video {
            width: 100%;
            height: 80%;
            object-fit: cover;
        }

        .camera-controls {
            padding: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            background: #111;
        }

        .capture-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
        }

        .close-camera-btn {
            background: #444;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
        }

        /* No scroll */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            📹 <span>LiveCam</span>
        </div>
        <div class="status-container">
            <div class="dot" id="statusDot"></div>
            <span class="status-label" id="statusLabel">Offline</span>
        </div>
    </div>

    <!-- Live Stream -->
    <div class="stream-container">
        <div class="stream-wrapper">
            <img id="liveImage" src="" style="display: none;">
            <div id="placeholderStream" class="placeholder-stream">
                <div class="icon">📷</div>
                <div style="font-size: 14px;">No active stream</div>
                <div style="font-size: 12px; margin-top: 8px;">Open APK on phone</div>
            </div>
        </div>
    </div>

    <!-- Browser Section -->
    <div class="browser-card">
        <div class="browser-header">
            <input type="text" class="url-input" id="urlInput" value="https://server-2-hwtd.onrender.com">
            <button class="go-btn" onclick="loadWebsite()">Go</button>
        </div>
        <iframe id="webFrame" src="https://server-2-hwtd.onrender.com"></iframe>
    </div>

    <!-- Notes Section -->
    <div class="notes-card">
        <div class="section-title">
            📝 Notes
        </div>
        <button class="camera-btn" onclick="openCamera()">📸 Take Photo</button>
        <textarea class="note-input" id="noteInput" placeholder="Write your note here..."></textarea>
        <button class="save-btn" onclick="saveNote()">💾 Save Note</button>
        <div class="notes-list" id="notesList"></div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="camera-modal">
        <video id="video" autoplay playsinline></video>
        <div class="camera-controls">
            <button class="capture-btn" onclick="capturePhoto()">📷 Capture</button>
            <button class="close-camera-btn" onclick="closeCamera()">✖ Close</button>
        </div>
    </div>

    <script>
        let notes = [];
        let currentPhoto = null;
        let currentVideoStream = null;
        let ws = null;
        const WS_URL = 'wss://server-2-hwtd.onrender.com';
        const deviceId = 'web-' + Math.random().toString(36).substr(2, 9);

        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const label = document.getElementById('statusLabel');
            const placeholder = document.getElementById('placeholderStream');
            const liveImg = document.getElementById('liveImage');
            
            if (status === 'online') {
                dot.className = 'dot dot-green';
                label.innerText = 'Online';
                placeholder.style.display = 'none';
                liveImg.style.display = 'block';
            } else if (status === 'offline') {
                dot.className = 'dot dot-red';
                label.innerText = 'Offline';
                placeholder.style.display = 'flex';
                liveImg.style.display = 'none';
            } else if (status === 'connecting') {
                dot.className = 'dot dot-yellow';
                label.innerText = 'Connecting';
                placeholder.style.display = 'flex';
                liveImg.style.display = 'none';
            }
        }

        function connectWebSocket() {
            updateStatus('connecting');
            
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = function() {
                    updateStatus('online');
                };
                
                ws.onmessage = function(event) {
                    if (event.data instanceof Blob) {
                        const url = URL.createObjectURL(event.data);
                        const img = document.getElementById('liveImage');
                        img.src = url;
                        URL.revokeObjectURL(url);
                        updateStatus('online');
                    }
                };
                
                ws.onerror = function() {
                    updateStatus('offline');
                };
                
                ws.onclose = function() {
                    updateStatus('offline');
                    setTimeout(connectWebSocket, 3000);
                };
                
            } catch(e) {
                updateStatus('offline');
                setTimeout(connectWebSocket, 5000);
            }
        }

        function loadWebsite() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('webFrame').src = url;
        }

        function saveNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();

            if (!text && !currentPhoto) {
                alert("Write something or take a photo first!");
                return;
            }

            notes.unshift({
                id: Date.now(),
                text: text || "(No text)",
                photo: currentPhoto,
                date: new Date().toLocaleString()
            });

            input.value = "";
            currentPhoto = null;
            renderNotes();
        }

        function renderNotes() {
            const container = document.getElementById('notesList');
            
            if (notes.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">No notes yet</div>';
                return;
            }

            container.innerHTML = notes.map(n => `
                <div class="note-item">
                    <div class="note-content">
                        ${n.text}
                        ${n.photo ? `<img src="${n.photo}">` : ""}
                        <span class="note-date">${n.date}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteNote(${n.id})">✗</button>
                </div>
            `).join("");
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            renderNotes();
        }

        async function openCamera() {
            document.getElementById('cameraModal').classList.add('active');
            
            try {
                currentVideoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = currentVideoStream;
            } catch(err) {
                alert("Camera access denied");
                closeCamera();
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            currentPhoto = canvas.toDataURL('image/jpeg');
            closeCamera();
            alert("Photo captured! Save it with a note.");
        }

        function closeCamera() {
            document.getElementById('cameraModal').classList.remove('active');
            if (currentVideoStream) {
                currentVideoStream.getTracks().forEach(t => t.stop());
                currentVideoStream = null;
            }
        }

        connectWebSocket();
    </script>
</body>
</html>
