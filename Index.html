<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 App Status Monitor | Real-time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .status-card {
            margin: 30px 0;
            padding: 30px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }
        
        .status-card.active {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 10px 30px rgba(34,197,94,0.3);
        }
        
        .status-card.off {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 10px 30px rgba(239,68,68,0.3);
        }
        
        .dot {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
        }
        
        .dot.active {
            background: #22c55e;
            box-shadow: 0 0 20px #22c55e;
        }
        
        .dot.off {
            background: #94a3b8;
            box-shadow: none;
            animation: none;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34,197,94,0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(34,197,94,0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34,197,94,0);
            }
        }
        
        .status-text {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .info {
            margin-top: 30px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            font-size: 14px;
            color: #475569;
        }
        
        .info p {
            margin: 8px 0;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #e2e8f0;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .history {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 12px;
        }
        
        h1 {
            color: #1e293b;
            font-size: 24px;
        }
        
        .subtitle {
            color: #64748b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 App Status Monitor</h1>
        <p class="subtitle">Real-time Online/Offline Status</p>
        
        <div class="status-card" id="statusCard">
            <div class="dot" id="dot"></div>
            <div class="status-text" id="statusText">Checking...</div>
            <div class="badge" id="badge">Waiting for app</div>
        </div>
        
        <div class="info">
            <p>🔵 <strong>Last Activity:</strong> <span id="lastSeen">-</span></p>
            <p>🟢 <strong>Last Check:</strong> <span id="lastCheck">-</span></p>
            <p>📱 <strong>Device ID:</strong> <span id="deviceId">default</span></p>
        </div>
        
        <button onclick="refreshStatus()">🔄 Refresh Now</button>
        <button onclick="toggleHistory()">📜 Show History</button>
        
        <div id="historyContainer" class="history" style="display: none;"></div>
    </div>

    <script>
        let historyVisible = false;
        
        async function checkStatus() {
            try {
                const response = await fetch('/api/update-status');
                const data = await response.json();
                
                const statusCard = document.getElementById('statusCard');
                const dot = document.getElementById('dot');
                const statusText = document.getElementById('statusText');
                const badge = document.getElementById('badge');
                const lastSeenSpan = document.getElementById('lastSeen');
                
                if(data.status === 'active') {
                    statusCard.className = 'status-card active';
                    dot.className = 'dot active';
                    statusText.innerHTML = '✅ ACTIVE';
                    badge.innerHTML = '🟢 App is running';
                    lastSeenSpan.innerHTML = data.lastSeenHuman + ' (just now)';
                } else {
                    statusCard.className = 'status-card off';
                    dot.className = 'dot off';
                    statusText.innerHTML = '⭕ OFFLINE';
                    badge.innerHTML = '🔴 App is closed';
                    lastSeenSpan.innerHTML = data.lastSeenHuman || 'Never seen';
                }
                
                document.getElementById('lastCheck').innerHTML = new Date().toLocaleTimeString();
                
                if(historyVisible) {
                    loadHistory();
                }
                
            } catch(error) {
                console.error('Error:', error);
                document.getElementById('statusText').innerHTML = '❌ Connection Error';
            }
        }
        
        async function refreshStatus() {
            await checkStatus();
            document.getElementById('lastCheck').innerHTML = new Date().toLocaleTimeString() + ' (manual)';
        }
        
        async function toggleHistory() {
            historyVisible = !historyVisible;
            const container = document.getElementById('historyContainer');
            
            if(historyVisible) {
                await loadHistory();
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/update-status?history=true');
                const data = await response.json();
                
                const container = document.getElementById('historyContainer');
                if(data.history && data.history.length > 0) {
                    container.innerHTML = '<h3>📋 Recent Activity</h3>' + 
                        data.history.map(item => `
                            <div class="history-item">
                                ${item.status === 'active' ? '🟢 ACTIVE' : '🔴 OFFLINE'} - 
                                ${new Date(item.timestamp).toLocaleString()}
                            </div>
                        `).join('');
                } else {
                    container.innerHTML = '<p>No history yet</p>';
                }
            } catch(e) {
                console.error('History load error:', e);
            }
        }
        
        // Har 5 second mein check karo
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
