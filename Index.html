<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
        }
        
        .status-box {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            margin: 20px auto;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .status-box.red {
            background: #ef4444;
            box-shadow: 0 0 20px rgba(239,68,68,0.5);
        }
        
        .status-box.green {
            background: #22c55e;
            box-shadow: 0 0 30px rgba(34,197,94,0.6);
        }
        
        .status-box.checking {
            background: #64748b;
        }
        
        .info {
            margin-top: 30px;
            color: white;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        button {
            margin-top: 20px;
            padding: 10px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .status-label {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .status-label.red-text {
            color: #ef4444;
        }
        
        .status-label.green-text {
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 App Status</h1>
        
        <div class="status-box checking" id="statusBox"></div>
        <div class="status-label" id="statusLabel">Checking...</div>
        
        <div class="info">
            <div>📅 Last Update: <span id="lastUpdate">--:--:--</span></div>
        </div>
        
        <button onclick="refreshStatus()">🔄 Refresh</button>
    </div>

    <script>
        async function checkStatus() {
            try {
                const response = await fetch('/api/update-status');
                const data = await response.json();
                
                const box = document.getElementById('statusBox');
                const label = document.getElementById('statusLabel');
                
                if(data.status === 'active') {
                    box.className = 'status-box green';
                    label.innerHTML = '🟢 ACTIVE';
                    label.className = 'status-label green-text';
                } else {
                    box.className = 'status-box red';
                    label.innerHTML = '🔴 OFFLINE';
                    label.className = 'status-label red-text';
                }
                
                document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString();
                
            } catch(error) {
                const box = document.getElementById('statusBox');
                box.className = 'status-box red';
                document.getElementById('statusLabel').innerHTML = '⚠️ ERROR';
                document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString();
            }
        }
        
        async function refreshStatus() {
            await checkStatus();
        }
        
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
