<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mynoteapk - Web with Camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .browser-section {
            flex: 1.5;
            background: white;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #ddd;
        }

        .browser-header {
            background: #2196F3;
            padding: 10px;
            display: flex;
            gap: 8px;
        }

        .url-input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
        }

        .go-btn {
            background: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        .notes-section {
            flex: 1;
            background: white;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            text-align: center;
        }

        .camera-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .note-input {
            width: 100%;
            min-height: 60px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .save-btn {
            background: #FF9800;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .notes-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .note-item {
            background: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
            flex-direction: column;
        }

        .camera-modal.active {
            display: flex;
        }

        video {
            width: 100%;
            height: 70%;
            object-fit: cover;
        }

        .camera-controls {
            padding: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            background: #333;
        }

        .capture-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
        }

        .close-camera-btn {
            background: #666;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="browser-section">
        <div class="browser-header">
            <input type="text" class="url-input" id="urlInput" value="https://server-1-lkze.onrender.com">
            <button class="go-btn" onclick="loadWebsite()">🌐 Go</button>
        </div>

        <iframe id="webFrame" src="https://server-1-lkze.onrender.com"></iframe>
    </div>

    <div class="notes-section">
        <div class="section-title">📝 My Notes App</div>

        <button class="camera-btn" onclick="openCamera()">📸 Take Photo</button>

        <textarea class="note-input" id="noteInput" placeholder="Write your note here..."></textarea>

        <button class="save-btn" onclick="saveNote()">💾 Save Note</button>

        <div class="notes-list" id="notesList"></div>
    </div>

    <div id="cameraModal" class="camera-modal">
        <video id="video" autoplay playsinline></video>
        <div class="camera-controls">
            <button class="capture-btn" onclick="capturePhoto()">📷 Capture</button>
            <button class="close-camera-btn" onclick="closeCamera()">❌ Close</button>
        </div>
    </div>

<script>
let notes = [];
let currentPhoto = null;
let currentVideoStream = null;

function saveNote() {
    const input = document.getElementById('noteInput');
    const text = input.value.trim();

    if (!text && !currentPhoto) {
        alert("Empty note not allowed");
        return;
    }

    notes.unshift({
        id: Date.now(),
        text,
        photo: currentPhoto,
        date: new Date().toLocaleString()
    });

    input.value = "";
    currentPhoto = null;

    renderNotes();
}

function renderNotes() {
    const container = document.getElementById('notesList');

    container.innerHTML = notes.map(n => `
        <div class="note-item">
            <div>
                <div>${n.text}</div>
                ${n.photo ? `<img src="${n.photo}" style="max-width:80px;border-radius:6px;">` : ""}
                <small>${n.date}</small>
            </div>
            <button class="delete-btn" onclick="deleteNote(${n.id})">✗</button>
        </div>
    `).join("");
}

function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    renderNotes();
}

function loadWebsite() {
    let url = document.getElementById('urlInput').value;
    if (!url.startsWith('http')) url = 'https://' + url;
    document.getElementById('webFrame').src = url;
}

async function openCamera() {
    document.getElementById('cameraModal').classList.add('active');

    currentVideoStream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById('video').srcObject = currentVideoStream;
}

function capturePhoto() {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext('2d').drawImage(video, 0, 0);

    currentPhoto = canvas.toDataURL('image/jpeg');

    closeCamera();
}

function closeCamera() {
    document.getElementById('cameraModal').classList.remove('active');

    if (currentVideoStream) {
        currentVideoStream.getTracks().forEach(t => t.stop());
    }
}
</script>

</body>
</html>
