<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mynoteapk - Web with Camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Web Browser Section */
        .browser-section {
            flex: 1.5;
            background: white;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #ddd;
        }

        .browser-header {
            background: #2196F3;
            padding: 10px;
            display: flex;
            gap: 8px;
        }

        .url-input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
        }

        .go-btn {
            background: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* Notes Section */
        .notes-section {
            flex: 1;
            background: white;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            text-align: center;
        }

        .camera-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .camera-btn:hover {
            background: #45a049;
        }

        .note-input {
            width: 100%;
            min-height: 60px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
        }

        .save-btn {
            background: #FF9800;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .notes-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .note-item {
            background: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-left: 4px solid #FF9800;
        }

        .note-content {
            flex: 1;
            word-break: break-word;
        }

        .note-content img {
            max-width: 100%;
            max-height: 80px;
            border-radius: 8px;
            margin-top: 5px;
        }

        .note-date {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
        }

        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }

        /* Camera Modal */
        .camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
            flex-direction: column;
        }

        .camera-modal.active {
            display: flex;
        }

        video {
            width: 100%;
            height: 70%;
            object-fit: cover;
        }

        .camera-controls {
            padding: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            background: #333;
        }

        .capture-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .close-camera-btn {
            background: #666;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .photo-preview {
            margin-top: 5px;
        }

        .photo-preview img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
        }

        .info-text {
            font-size: 11px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Browser Section -->
    <div class="browser-section">
        <div class="browser-header">
            <input type="text" class="url-input" id="urlInput" value="https://www.google.com">
            <button class="go-btn" onclick="loadWebsite()">🌐 Go</button>
        </div>
        <iframe id="webFrame" src="https://www.google.com"></iframe>
    </div>

    <!-- Notes & Camera Section -->
    <div class="notes-section">
        <div class="section-title">📝 My Notes App</div>
        
        <button class="camera-btn" onclick="openCamera()">
            📸 Take Photo from Camera
        </button>
        
        <textarea class="note-input" id="noteInput" placeholder="Write your note here..."></textarea>
        <div id="photoPreview" class="photo-preview"></div>
        
        <button class="save-btn" onclick="saveNote()">💾 Save Note</button>
        
        <div class="notes-list" id="notesList"></div>
        <div class="info-text">✨ Tap note to edit | Click ✗ to delete</div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="camera-modal">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display: none;"></canvas>
        <div class="camera-controls">
            <button class="capture-btn" onclick="capturePhoto()">📷 Capture Photo</button>
            <button class="close-camera-btn" onclick="closeCamera()">❌ Close</button>
        </div>
    </div>

    <script>
        // ========== DATA STORAGE ==========
        let notes = [];
        let currentPhoto = null;
        let currentVideoStream = null;
        let editingNoteId = null;

        // Load notes from localStorage
        function loadNotes() {
            const saved = localStorage.getItem('mynoteapk_web_notes');
            if (saved) {
                notes = JSON.parse(saved);
            }
            renderNotes();
        }

        // Save notes to localStorage
        function saveNotesToStorage() {
            localStorage.setItem('mynoteapk_web_notes', JSON.stringify(notes));
        }

        // Save current note
        function saveNote() {
            const input = document.getElementById('noteInput');
            let text = input.value.trim();
            
            if (!text && !currentPhoto) {
                alert('Please write something or take a photo!');
                return;
            }
            
            if (editingNoteId !== null) {
                // Update existing note
                const index = notes.findIndex(n => n.id === editingNoteId);
                if (index !== -1) {
                    notes[index].text = text;
                    if (currentPhoto) {
                        notes[index].photo = currentPhoto;
                    }
                    notes[index].date = new Date().toLocaleString();
                }
                editingNoteId = null;
            } else {
                // Add new note
                const note = {
                    id: Date.now(),
                    text: text,
                    photo: currentPhoto,
                    date: new Date().toLocaleString()
                };
                notes.unshift(note);
            }
            
            saveNotesToStorage();
            renderNotes();
            
            // Reset form
            document.getElementById('noteInput').value = '';
            currentPhoto = null;
            document.getElementById('photoPreview').innerHTML = '';
        }

        // Edit note (tap on note)
        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                document.getElementById('noteInput').value = note.text;
                if (note.photo) {
                    currentPhoto = note.photo;
                    document.getElementById('photoPreview').innerHTML = `<img src="${note.photo}"/>`;
                }
                editingNoteId = id;
                
                // Delete old note
                notes = notes.filter(n => n.id !== id);
                saveNotesToStorage();
                renderNotes();
                
                // Scroll to input
                document.getElementById('noteInput').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Delete note
        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            saveNotesToStorage();
            renderNotes();
        }

        // Render notes list
        function renderNotes() {
            const container = document.getElementById('notesList');
            
            if (notes.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">📭 No notes yet.<br>Write your first note!</div>';
                return;
            }
            
            container.innerHTML = notes.map(note => `
                <div class="note-item" onclick="editNote(${note.id})">
                    <div class="note-content">
                        ${note.photo ? `<img src="${note.photo}" alt="photo note"/>` : ''}
                        <div>${escapeHtml(note.text.substring(0, 100))}${note.text.length > 100 ? '...' : ''}</div>
                        <div class="note-date">📅 ${note.date}</div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteNote(${note.id})">✗</button>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== WEB BROWSER FUNCTIONS ==========
        function loadWebsite() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            document.getElementById('webFrame').src = url;
            document.getElementById('urlInput').value = url;
        }

        // Enter key support
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadWebsite();
            }
        });

        // ========== CAMERA FUNCTIONS ==========
        async function openCamera() {
            const modal = document.getElementById('cameraModal');
            modal.classList.add('active');
            
            try {
                currentVideoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }  // Back camera prefer karega
                });
                const video = document.getElementById('video');
                video.srcObject = currentVideoStream;
                await video.play();
            } catch (error) {
                console.error('Camera error:', error);
                alert('Camera access denied or error. Please allow camera permission.');
                closeCamera();
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to base64 image
            currentPhoto = canvas.toDataURL('image/jpeg', 0.8);
            
            // Show preview
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = `<img src="${currentPhoto}" alt="Captured photo"/>`;
            
            closeCamera();
        }

        function closeCamera() {
            const modal = document.getElementById('cameraModal');
            modal.classList.remove('active');
            
            if (currentVideoStream) {
                currentVideoStream.getTracks().forEach(track => track.stop());
                currentVideoStream = null;
            }
        }

        // ========== INITIALIZE ==========
        loadNotes();
    </script>
</body>
  </html>
